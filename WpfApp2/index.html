<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm danh</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:40px">

    <h2>Điểm Danh Sinh Viên</h2>

    <form method="post">

        <input name="name" placeholder="Nhập tên" required
               style="width:80%;padding:12px;font-size:18px">

        <br><br>

        <input name="msv" placeholder="Nhập mã sinh viên" required
               style="width:80%;padding:12px;font-size:18px">

        <br><br>

        <input name="numbtele" placeholder="Nhập số điện thoại" required
               style="width:80%;padding:12px;font-size:18px">

        <br><br>

        <button type="submit"
                style="width:80%;padding:12px;font-size:20px;background:#4CAF50;color:white;border:none">
            Gửi
        </button>

    </form>

</body>
</html>
